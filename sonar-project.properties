# SonarQube Configuration
sonar.projectKey=brillio-api
sonar.projectName=Brillio API
sonar.projectVersion=1.0

# Source code location
sonar.sources=app
sonar.tests=tests

# Exclusions
sonar.exclusions=**/Api/V2/**,**/migrations/**,**/seeders/**,**/factories/**
sonar.test.exclusions=**/Feature/**,**/Unit/**

# PHP configuration
sonar.php.version=8.2
sonar.php.coverage.reportPaths=coverage.xml

# Duplication exclusions
# V2 API controllers are intentional thin wrappers for API versioning
sonar.cpd.php.exclusions=**/Api/V2/**

# Code coverage exclusions
sonar.coverage.exclusions=**/Api/V2/**,**/migrations/**,**/seeders/**,**/factories/**
